<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Update Log Analyzer — Simplicity RSPS</title>
<style>
  :root {
    --bg: #0d0f14; --surface: #161b24; --surface2: #1e2635; --border: #2a3347;
    --accent: #4f8ef7; --green: #22c55e; --yellow: #eab308; --red: #ef4444;
    --orange: #f97316; --text: #e2e8f0; --muted: #64748b; --dim: #94a3b8;
    --purple: #a855f7; --pink: #ec4899;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

  .hdr { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
  .hdr-l { display: flex; align-items: center; gap: 14px; }
  .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -.3px; }
  .logo span { color: var(--dim); font-weight: 400; font-size: 14px; }
  .badge { background: var(--surface2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; color: var(--dim); font-size: 11px; }
  .back-btn { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; text-decoration: none; border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; transition: color .2s, border-color .2s; }
  .back-btn:hover { color: var(--text); border-color: var(--accent); }

  .main { max-width: 1100px; margin: 0 auto; padding: 32px; }

  .hero { margin-bottom: 28px; }
  .hero h1 { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
  .hero h1 span { color: var(--accent); }
  .hero p { color: var(--muted); font-size: 13px; line-height: 1.6; max-width: 560px; }

  /* INPUT CARD */
  .input-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }

  /* TABS */
  .tabs { display: flex; gap: 4px; margin-bottom: 18px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 4px; width: fit-content; }
  .tab { padding: 6px 16px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; background: transparent; color: var(--muted); transition: all .2s; }
  .tab.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  /* URL INPUT */
  .url-row { display: flex; gap: 10px; }
  .url-input { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px; padding: 10px 14px; outline: none; transition: border-color .2s; }
  .url-input:focus { border-color: var(--accent); }
  .url-input::placeholder { color: var(--muted); }

  /* PASTE INPUT */
  .paste-row { display: flex; gap: 12px; align-items: flex-start; }
  textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Segoe UI', monospace; font-size: 12px; padding: 12px; resize: vertical; min-height: 150px; outline: none; transition: border-color .2s; line-height: 1.5; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .input-actions { display: flex; flex-direction: column; gap: 8px; min-width: 120px; }

  /* FETCH STATUS */
  .fetch-status { margin-top: 10px; font-size: 12px; color: var(--muted); min-height: 18px; display: flex; align-items: center; gap: 8px; }
  .spinner { width: 13px; height: 13px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* BUTTONS */
  .btn { padding: 10px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; border: none; cursor: pointer; transition: opacity .2s, background .2s; white-space: nowrap; width: 100%; text-align: center; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { opacity: .85; }
  .btn-ghost { background: var(--surface2); border: 1px solid var(--border); color: var(--dim); }
  .btn-ghost:hover { border-color: var(--accent); color: var(--text); }
  .btn-sm { padding: 6px 12px; font-size: 11px; border-radius: 6px; }
  .btn:disabled { opacity: .45; cursor: not-allowed; }

  /* SUMMARY STRIP */
  .summary-strip { display: flex; align-items: center; gap: 24px; padding: 14px 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .strip-stat { display: flex; flex-direction: column; }
  .strip-val { font-size: 20px; font-weight: 800; line-height: 1; }
  .strip-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-top: 3px; }
  .strip-div { width: 1px; height: 32px; background: var(--border); flex-shrink: 0; }

  /* CATEGORY NAV */
  .cat-nav { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 20px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  .cat-nav::-webkit-scrollbar { height: 4px; }
  .cat-nav::-webkit-scrollbar-track { background: transparent; }
  .cat-nav::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .cat-card { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 14px 20px; cursor: pointer; flex-shrink: 0; min-width: 110px; text-align: center; transition: border-color .2s, background .2s; }
  .cat-card:hover { border-color: var(--c, var(--accent)); background: var(--surface2); }
  .cat-card.active { border-color: var(--c, var(--accent)); background: var(--surface2); }
  .cat-icon { font-size: 22px; line-height: 1; margin-bottom: 8px; }
  .cat-count { font-size: 26px; font-weight: 800; color: var(--c, var(--accent)); line-height: 1; margin-bottom: 5px; }
  .cat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; line-height: 1.3; }

  /* SECTION TOOLBAR */
  .sec-toolbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .sec-toolbar-title { font-size: 13px; font-weight: 700; color: var(--dim); }
  .toolbar-actions { display: flex; gap: 8px; }

  /* SECTIONS GRID */
  .sections-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 14px; }

  /* SECTION CARD */
  .sec-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; transition: border-color .2s; }
  .sec-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--c, var(--accent)); opacity: .7; transition: opacity .2s; }
  .sec-card:hover { border-color: var(--c, var(--border)); }
  .sec-card:hover::before { opacity: 1; }
  .sec-head { display: flex; align-items: center; gap: 10px; padding: 15px 16px 13px; cursor: pointer; user-select: none; }
  .sec-icon { font-size: 20px; line-height: 1; flex-shrink: 0; }
  .sec-meta { flex: 1; min-width: 0; }
  .sec-name { font-size: 13px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .sec-type { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }
  .sec-count { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 2px 9px; font-size: 11px; font-weight: 700; color: var(--dim); flex-shrink: 0; }
  .chevron { color: var(--muted); font-size: 10px; transition: transform .25s; flex-shrink: 0; margin-left: 4px; }
  .sec-card.open .chevron { transform: rotate(180deg); }
  .sec-body { display: none; border-top: 1px solid var(--border); padding: 12px 16px 14px; }
  .sec-card.open .sec-body { display: block; }
  .sec-body ul { list-style: none; display: flex; flex-direction: column; gap: 4px; }
  .sec-body li { font-size: 12px; color: var(--dim); line-height: 1.55; padding-left: 16px; position: relative; word-break: break-word; }
  .sec-body li::before { content: '—'; position: absolute; left: 0; color: var(--muted); font-size: 11px; top: 1px; }

  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 8px; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty { text-align: center; padding: 64px 32px; color: var(--muted); font-size: 14px; line-height: 1.7; }
  .empty-icon { font-size: 36px; margin-bottom: 12px; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <div class="logo">Simplicity RSPS <span>/ Staff Tools</span></div>
    <div class="badge">Internal</div>
  </div>
  <a href="index.html" class="back-btn">← Back to Staff Tools</a>
</header>

<div class="main">
  <div class="hero">
    <h1>Update Log <span>Analyzer</span></h1>
    <p>Paste a forum URL or raw BBCode to instantly generate a structured, filterable summary grouped by section type.</p>
  </div>

  <div class="input-card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('url', this)">From URL</button>
      <button class="tab" onclick="switchTab('paste', this)">Paste BBCode</button>
    </div>

    <!-- URL TAB -->
    <div id="tab-url">
      <div class="url-row">
        <input class="url-input" id="url-input" type="url"
          placeholder="https://community.simplicityrsps.com/index.php?/topic/..."
          onkeydown="if(event.key==='Enter') fetchUrl()" />
        <button class="btn btn-primary" id="fetch-btn" onclick="fetchUrl()" style="width:auto;padding:10px 22px">Fetch &amp; Analyze</button>
      </div>
      <div class="fetch-status" id="fetch-status"></div>
    </div>

    <!-- PASTE TAB -->
    <div id="tab-paste" class="hidden">
      <div class="paste-row">
        <textarea id="raw-input" placeholder="Paste the raw BBCode from the forum editor here...&#10;&#10;The parser handles [b], [list], [*], [img], [color], [center] etc.&#10;All-caps section headers are auto-detected."></textarea>
        <div class="input-actions">
          <button class="btn btn-primary" onclick="analyzePaste()">Analyze →</button>
          <button class="btn btn-ghost" onclick="clearAll()">Clear</button>
        </div>
      </div>
    </div>
  </div>

  <div id="results" class="hidden">
    <div id="summary-strip" class="summary-strip"></div>
    <div id="cat-nav" class="cat-nav"></div>
    <div class="sec-toolbar">
      <div id="sec-toolbar-title" class="sec-toolbar-title"></div>
      <div class="toolbar-actions">
        <button class="btn btn-ghost btn-sm" onclick="toggleAll(true)">Expand All</button>
        <button class="btn btn-ghost btn-sm" onclick="toggleAll(false)">Collapse All</button>
        <button class="btn btn-ghost btn-sm" onclick="copySummary()">Copy Summary</button>
      </div>
    </div>
    <div id="sections-grid" class="sections-grid"></div>
  </div>

  <div id="empty-state" class="empty">
    <div class="empty-icon">📋</div>
    Paste a forum URL above and click <strong>Fetch &amp; Analyze</strong>,<br>or switch to the BBCode tab to paste manually.
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// ── SECTION TYPES ─────────────────────────────────────────────────────────────
const TYPES = [
  { key:'fixes',    label:'Bug Fixes',    icon:'🔧', color:'#ef4444', keywords:['FIX','BUG','PATCH','RESOLV','CORRECT','PREVENT','ELIMINAT'] },
  { key:'changes',  label:'Changes',      icon:'⚖️', color:'#eab308', keywords:['CHANGE','QOL','QUALITY','REBALANC','TWEAK','ADJUST','REVAMP','REWORK','BUFF','NERF','TUNING'] },
  { key:'boss',     label:'Boss Rework',  icon:'👑', color:'#a855f7', keywords:['OVERHAUL','NEX','NIGHTMARE','CORPOREAL','HYDRA','CERBERUS','ZULRAH','VORKATH','WHISPERER','LEVIATHAN','DUKE','VARDORVIS','GROTESQUE','ABYSSAL','KRAKEN','THERMONUCLEAR','PHANTOM','SCURRIUS','KALPHITE','CHAOS','DAGANNOTH','SARACHNIS','DERANGED'] },
  { key:'slayer',   label:'Elite Slayer', icon:'⚔️', color:'#f0b429', keywords:['SLAYER','ES5','ES4','ES3','ES2','ES1','IMMORTAL','ASTRAL','SACRIFICE'] },
  { key:'content',  label:'New Content',  icon:'📦', color:'#22c55e', keywords:['CONTENT','ADDITION','NEW ITEM','NEW PET','NEW BOSS','DROP TABLE','OPEN-ALL','OPEN ALL'] },
  { key:'client',   label:'Client / UI',  icon:'🖥️', color:'#4f8ef7', keywords:['CLIENT','AUDIO','SOUND','MUSIC','INTERFACE','LOGIN','VISUAL','BANK INTERFACE','SETTINGS','RESIZEABLE','RESIZABLE'] },
  { key:'donation', label:'Donation',     icon:'💎', color:'#ec4899', keywords:['DONATION','STORE','ORB','PREMIUM'] },
  { key:'feature',  label:'Feature',      icon:'✨', color:'#4f8ef7', keywords:[] },
];

function getType(name) {
  const u = name.toUpperCase();
  for (const t of TYPES) {
    if (t.key === 'feature') continue;
    if (t.keywords.some(k => u.includes(k))) return t;
  }
  return TYPES.find(t => t.key === 'feature');
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-url').classList.toggle('hidden', name !== 'url');
  document.getElementById('tab-paste').classList.toggle('hidden', name !== 'paste');
}

// ── URL FETCH ─────────────────────────────────────────────────────────────────

// Each proxy fn takes a URL string and returns the page HTML string, or throws.
const PROXIES = [
  async url => {
    const r = await fetch('https://corsproxy.io/?' + encodeURIComponent(url));
    if (!r.ok) throw new Error(r.status);
    return r.text();
  },
  async url => {
    const r = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent(url));
    if (!r.ok) throw new Error(r.status);
    return r.text();
  },
  async url => {
    const r = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url));
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    if (!d.contents) throw new Error('empty');
    return d.contents;
  },
  async url => {
    const r = await fetch('https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url));
    if (!r.ok) throw new Error(r.status);
    return r.text();
  },
];

async function fetchWithFallback(url, onStatus) {
  for (let i = 0; i < PROXIES.length; i++) {
    onStatus(`<span class="spinner"></span> Trying proxy ${i + 1} of ${PROXIES.length}…`);
    try {
      const html = await PROXIES[i](url);
      if (html && html.length > 500) return html;
    } catch (e) { /* try next */ }
  }
  throw new Error('All proxies failed');
}

async function fetchUrl() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;

  const btn = document.getElementById('fetch-btn');
  const status = document.getElementById('fetch-status');
  btn.disabled = true;

  try {
    const html = await fetchWithFallback(url, s => { status.innerHTML = s; });

    status.innerHTML = '<span class="spinner"></span> Parsing…';
    const sections = parseHtml(html);

    if (!sections.length) {
      status.innerHTML = '⚠️ Fetched the page but could not find post content — the forum may require login.';
      btn.disabled = false;
      return;
    }

    status.innerHTML = `✓ Loaded ${sections.length} sections from forum post`;
    render(sections);
  } catch (e) {
    status.innerHTML = '⚠️ All fetch attempts failed. The forum may be blocking proxies — try the Paste BBCode tab.';
    console.error(e);
  }

  btn.disabled = false;
}

// ── HTML PARSER (for fetched pages) ──────────────────────────────────────────
function parseHtml(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');

  // Try IPB selectors in order of specificity
  const selectors = [
    '[data-commentid]:first-of-type .ipsType_richText',
    '.cPost_contentWrap .ipsType_richText',
    '.ipsType_richText',
    '[data-role="commentContent"]',
    '.ipsComment_content',
    'article .ipsType_normal',
  ];

  let body = null;
  for (const sel of selectors) {
    body = doc.querySelector(sel);
    if (body) break;
  }

  if (!body) return [];

  // Walk the DOM and convert to structured lines
  const lines = [];
  walkNode(body, lines);

  return linesToSections(lines);
}

function walkNode(node, out) {
  if (node.nodeType === Node.TEXT_NODE) {
    const t = node.textContent.trim();
    if (t) out.push({ type: 'text', text: t });
    return;
  }
  if (node.nodeType !== Node.ELEMENT_NODE) return;

  const tag = node.tagName.toLowerCase();

  // Skip images, iframes, scripts, style
  if (['img','picture','video','iframe','script','style','svg'].includes(tag)) return;

  if (tag === 'li') {
    out.push({ type: 'item', text: node.textContent.trim() });
    return;
  }

  if (['strong','b'].includes(tag)) {
    const t = node.textContent.trim();
    if (t) out.push({ type: 'bold', text: t });
    return;
  }

  if (['h1','h2','h3','h4'].includes(tag)) {
    const t = node.textContent.trim();
    if (t) out.push({ type: 'heading', text: t });
    return;
  }

  if (tag === 'br') {
    out.push({ type: 'br' });
    return;
  }

  // For block elements, recurse then add a break
  const isBlock = ['p','div','section','article','blockquote','ul','ol','table','tr'].includes(tag);
  for (const child of node.childNodes) walkNode(child, out);
  if (isBlock) out.push({ type: 'br' });
}

function isHeaderText(text) {
  if (!text || text.length < 2 || text.length > 90) return false;
  if (/^[-—–•*►]\s/.test(text)) return false;
  const letters = (text.match(/[a-zA-Z]/g) || []);
  if (letters.length < 3) return false;
  const uppers = (text.match(/[A-Z]/g) || []).length;
  const ratio = uppers / letters.length;
  const words = text.split(/\s+/).filter(w => /[a-zA-Z]/.test(w));
  return ratio >= 0.7 && words.length <= 10;
}

function cleanHeaderText(t) {
  return t.replace(/^[\u{1F000}-\u{1FFFF}☀-➿\s]+/gu, '').trim();
}

function linesToSections(lines) {
  const sections = [];
  let cur = null;

  for (const line of lines) {
    if (line.type === 'br') continue;

    const text = line.text?.trim();
    if (!text) continue;

    // Bold/heading that looks like a header → new section
    if ((line.type === 'bold' || line.type === 'heading') && isHeaderText(text)) {
      const name = cleanHeaderText(text) || text;
      if (name.length >= 2) {
        cur = { name, items: [] };
        sections.push(cur);
      }
      continue;
    }

    // List item → always add to current section
    if (line.type === 'item' && cur) {
      const item = text.replace(/^[-—–•*►]+\s*/, '').trim();
      if (item.length > 1) cur.items.push(item);
      continue;
    }

    // Plain text — could be a header (all caps) or an item
    if (line.type === 'text' && isHeaderText(text)) {
      const name = cleanHeaderText(text) || text;
      if (name.length >= 2) {
        cur = { name, items: [] };
        sections.push(cur);
      }
      continue;
    }

    // Otherwise treat as an item if inside a section
    if (cur && text.length > 1) {
      const item = text.replace(/^[-—–•*►]+\s*/, '').trim();
      if (item.length > 1 && !isHeaderText(item)) cur.items.push(item);
    }
  }

  return sections.filter(s => s.name.length > 1);
}

// ── BBCODE PARSER (for paste tab) ────────────────────────────────────────────
function stripBBCode(text) {
  text = text.replace(/\[img[^\]]*\][\s\S]*?\[\/img\]/gi, '');
  text = text.replace(/\[video[^\]]*\][\s\S]*?\[\/video\]/gi, '');
  text = text.replace(/\[attach[^\]]*\][\s\S]*?\[\/attach\]/gi, '');
  text = text.replace(/\[url=[^\]]*\]([\s\S]*?)\[\/url\]/gi, '$1');
  text = text.replace(/\[url\]([\s\S]*?)\[\/url\]/gi, '$1');
  text = text.replace(/\[list[^\]]*\]/gi, '\n');
  text = text.replace(/\[\/list\]/gi, '\n');
  text = text.replace(/\[\*\]/gi, '\n- ');
  text = text.replace(/\[hr\]/gi, '\n');
  text = text.replace(/\[[^\]]+\]/g, '');
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  text = text.replace(/\n{3,}/g, '\n\n');
  return text.trim();
}

function parsePost(raw) {
  const text = stripBBCode(raw);
  const lines = text.split('\n');
  const sections = [];
  let cur = null;

  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) continue;
    if (isHeaderText(line)) {
      const name = cleanHeaderText(line) || line;
      if (name.length >= 2) { cur = { name, items: [] }; sections.push(cur); }
    } else if (cur) {
      const item = line.replace(/^[-—–•*►]+\s*/, '').trim();
      if (item.length > 1) cur.items.push(item);
    }
  }

  return sections.filter(s => s.name.length > 1);
}

// ── STATE + ENTRY POINTS ──────────────────────────────────────────────────────
let parsed = [];
let activeFilter = 'all';

function analyzePaste() {
  const raw = document.getElementById('raw-input').value.trim();
  if (!raw) return;
  const sections = parsePost(raw);
  if (!sections.length) { showToast('No sections detected — check the pasted content.'); return; }
  render(sections);
}

function render(sections) {
  parsed = sections;
  document.getElementById('empty-state').classList.add('hidden');
  document.getElementById('results').classList.remove('hidden');
  renderSummary();
  renderCatNav();
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderSummary() {
  const total = parsed.reduce((s, sec) => s + sec.items.length, 0);
  const fixes = parsed.find(s => getType(s.name).key === 'fixes');
  const stats = [
    { val: parsed.length, lbl: 'Sections',    color: 'var(--accent)' },
    { val: total,          lbl: 'Total Items', color: 'var(--green)'  },
    { val: fixes ? fixes.items.length : 0, lbl: 'Bug Fixes', color: 'var(--red)' },
  ];
  document.getElementById('summary-strip').innerHTML =
    stats.map((s, i) => `
      ${i > 0 ? '<div class="strip-div"></div>' : ''}
      <div class="strip-stat">
        <span class="strip-val" style="color:${s.color}">${s.val}</span>
        <span class="strip-lbl">${s.lbl}</span>
      </div>`).join('');
}

function renderCatNav() {
  // Build category list in TYPES order, only those that exist in the data
  const catSecs = {};
  parsed.forEach(s => {
    const k = getType(s.name).key;
    if (!catSecs[k]) catSecs[k] = [];
    catSecs[k].push(s);
  });

  const orderedTypes = TYPES.filter(t => catSecs[t.key]);
  // Default to first real category (skip 'feature' if something better exists)
  const firstKey = orderedTypes.find(t => t.key !== 'feature')?.key
                || orderedTypes[0]?.key || 'feature';

  let html = '';
  for (const t of orderedTypes) {
    const itemCount = catSecs[t.key].reduce((s, sec) => s + sec.items.length, 0);
    html += `
      <div class="cat-card ${t.key === firstKey ? 'active' : ''}" style="--c:${t.color}"
           onclick="selectCat('${t.key}', this)">
        <div class="cat-icon">${t.icon}</div>
        <div class="cat-count">${itemCount}</div>
        <div class="cat-label">${t.label}</div>
      </div>`;
  }
  document.getElementById('cat-nav').innerHTML = html;

  activeFilter = firstKey;
  renderSections();
}

function selectCat(key, card) {
  activeFilter = key;
  document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
  card.classList.add('active');
  renderSections();
}

function renderSections() {
  const list = parsed.filter(s => getType(s.name).key === activeFilter);
  const grid = document.getElementById('sections-grid');
  const activeDef = TYPES.find(t => t.key === activeFilter);
  const totalItems = list.reduce((s, sec) => s + sec.items.length, 0);
  document.getElementById('sec-toolbar-title').textContent =
    activeDef ? `${activeDef.icon}  ${activeDef.label} — ${list.length} section${list.length !== 1 ? 's' : ''}, ${totalItems} item${totalItems !== 1 ? 's' : ''}` : '';

  if (!list.length) {
    grid.innerHTML = '<p style="color:var(--muted);font-size:13px;grid-column:1/-1;text-align:center;padding:32px">No sections in this category.</p>';
    return;
  }
  grid.innerHTML = list.map(sec => {
    const t = getType(sec.name);
    const items = sec.items.length
      ? sec.items.map(i => `<li>${esc(i)}</li>`).join('')
      : '<li style="color:var(--muted)">No items listed.</li>';
    return `
      <div class="sec-card" style="--c:${t.color}" onclick="toggleCard(this)">
        <div class="sec-head">
          <span class="sec-icon">${t.icon}</span>
          <div class="sec-meta">
            <div class="sec-name">${esc(sec.name)}</div>
            <div class="sec-type">${t.label}</div>
          </div>
          <span class="sec-count">${sec.items.length}</span>
          <span class="chevron">▼</span>
        </div>
        <div class="sec-body"><ul>${items}</ul></div>
      </div>`;
  }).join('');
}

function toggleCard(card) { card.classList.toggle('open'); }
function toggleAll(open) { document.querySelectorAll('.sec-card').forEach(c => c.classList.toggle('open', open)); }

// ── COPY SUMMARY ──────────────────────────────────────────────────────────────
function copySummary() {
  if (!parsed.length) return;
  const total = parsed.reduce((s, sec) => s + sec.items.length, 0);
  const fixes = parsed.find(s => getType(s.name).key === 'fixes');
  let out = `UPDATE SUMMARY\n${'─'.repeat(50)}\n${parsed.length} sections  •  ${total} total items`;
  if (fixes) out += `  •  ${fixes.items.length} bug fixes`;
  out += `\n${'─'.repeat(50)}\n\n`;
  const groups = {};
  parsed.forEach(s => { const t = getType(s.name); if (!groups[t.key]) groups[t.key] = { t, secs: [] }; groups[t.key].secs.push(s); });
  for (const { t, secs } of Object.values(groups)) {
    out += `${t.icon}  ${t.label.toUpperCase()}\n`;
    secs.forEach(s => {
      out += `  ▸ ${s.name} (${s.items.length} items)\n`;
      s.items.slice(0, 3).forEach(i => { out += `      — ${i}\n`; });
      if (s.items.length > 3) out += `      … and ${s.items.length - 3} more\n`;
    });
    out += '\n';
  }
  navigator.clipboard.writeText(out.trim()).then(() => showToast('Summary copied to clipboard!'));
}

// ── UTIL ──────────────────────────────────────────────────────────────────────
function clearAll() {
  document.getElementById('raw-input').value = '';
  document.getElementById('results').classList.add('hidden');
  document.getElementById('empty-state').classList.remove('hidden');
  parsed = [];
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}
</script>
</body>
